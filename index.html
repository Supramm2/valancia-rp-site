<!DOCTYPE html>
<html>
<head>
<title>Valancia RP</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
.logo{
width:180px;
border-radius:50%;
box-shadow:0 0 40px rgba(0,150,255,0.8);
margin-top:30px;
}
  
body{
font-family: Arial, sans-serif;
background: radial-gradient(circle at top, #0a1f44, #020617);
color:white;
text-align:center;
margin:0;
}

header{
background:#1e293b;
padding:30px;
font-size:30px;
}

button{
background: linear-gradient(90deg,#00bfff,#004cff);
color:white;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:12px;
cursor:pointer;
box-shadow:0 0 20px rgba(0,150,255,0.7);
transition:0.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 30px rgba(0,150,255,1);
}

section{
padding:40px;
}

.rules{
background:#1e293b;
margin:20px;
padding:20px;
border-radius:10px;
}
</style>
</head>

<body>

<header>

<img src="logo.png" class="logo">

<h1>Valancia RP</h1>

</header>

<section>

<h2>Rejoindre le Discord</h2>

<a href="https://discord.gg/valanciarp">
<button>Rejoindre le Discord</button>
</a>

</section>

<section>

<h2>Règlement du serveur</h2>

<div class="rules">
<h3>1. Respect</h3>
<p>Le respect envers tous les joueurs est obligatoire.</p>
</div>

<div class="rules">
<h3>2. Roleplay</h3>
<p>Le troll, le no RP et le win RP sont interdits.</p>
</div>

<div class="rules">
<h3>3. Cheats</h3>
<p>Les cheats et usebugs sont strictement interdits.</p>
</div>

</section>

</body>
</html>
